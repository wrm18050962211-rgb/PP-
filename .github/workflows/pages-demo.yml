name: 发布调研扫码 Demo

on:
  push:
    branches:
      - codex/vertical-db-api
      - codex/qr-demo-public
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 套用扫码 Demo 补丁
        env:
          DEMO_PATCH_GZ_B64: >-
            
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          import os
          import pathlib
          import subprocess
          import sys

          patch_path = pathlib.Path('/tmp/pp-demo.patch')
          patch_path.write_bytes(gzip.decompress(base64.b64decode(os.environ['DEMO_PATCH_GZ_B64'])))

          if subprocess.run(['git', 'apply', '--check', str(patch_path)]).returncode == 0:
              subprocess.run(['git', 'apply', str(patch_path)], check=True)
          elif subprocess.run(['git', 'apply', '-R', '--check', str(patch_path)]).returncode == 0:
              print('Demo patch already present')
          else:
              sys.exit('Demo patch does not match this branch')
          PY

      - name: 设置 Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pp-app/package-lock.json

      - name: 安装依赖
        run: npm ci
        working-directory: pp-app

      - name: 构建网页
        run: npm run build -- --base=/PP-/
        working-directory: pp-app

      - name: 准备静态页面
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
        working-directory: pp-app

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传网页产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: pp-app/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 发布到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
