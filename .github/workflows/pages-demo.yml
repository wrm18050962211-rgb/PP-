name: 发布调研扫码 Demo

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pp-app/package-lock.json

      - name: 安装依赖
        run: npm ci
        working-directory: pp-app

      - name: 构建网页
        run: npm run build -- --base=/PP-/
        working-directory: pp-app

      - name: 准备静态页面
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
        working-directory: pp-app

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传网页产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: pp-app/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 发布到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
